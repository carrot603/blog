<title>3D Carrot World</title>
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:sans-serif;

  background:
    linear-gradient(
      to bottom,
      #7fd8ff 0%,
      #dff7ff 55%,
      #8fdd73 55%,
      #5cb84f 100%
    );

  perspective:1200px;
}

/* 雲 */

.cloud{
  position:absolute;
  background:white;
  border-radius:999px;
  opacity:0.9;

  animation:cloudMove linear infinite;
}

.cloud::before,
.cloud::after{
  content:"";
  position:absolute;
  background:white;
  border-radius:50%;
}

.cloud1{
  width:180px;
  height:60px;

  top:10%;
  left:-220px;

  animation-duration:28s;
}

.cloud1::before{
  width:70px;
  height:70px;

  top:-30px;
  left:25px;
}

.cloud1::after{
  width:90px;
  height:90px;

  top:-40px;
  right:20px;
}

.cloud2{
  width:140px;
  height:50px;

  top:25%;
  left:-180px;

  animation-duration:40s;
}

.cloud2::before{
  width:55px;
  height:55px;

  top:-20px;
  left:18px;
}

.cloud2::after{
  width:70px;
  height:70px;

  top:-28px;
  right:15px;
}

@keyframes cloudMove{
  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(140vw);
  }
}

/* 草地 */

.ground{
  position:absolute;
  bottom:0;

  width:100%;
  height:38%;

  background:
    linear-gradient(
      to top,
      #4b983f,
      #79d36d
    );
}

/* 主場景 */

.scene{
  position:relative;

  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 漂浮 */

.float{
  animation:float 3s ease-in-out infinite;
}

/* 3D旋轉 */

.spin{
  transform-style:preserve-3d;
  animation:spin 7s linear infinite;
}

/* 胡蘿蔔 */

.carrot{
  font-size:180px;

  filter:
    drop-shadow(
      0 25px 18px rgba(0,0,0,0.22)
    );
}

h1{
  margin-top:24px;

  font-size:42px;
  color:#d96b1f;

  text-shadow:
    0 4px 10px rgba(255,255,255,0.7);
}

p{
  margin-top:8px;

  font-size:20px;
  color:#47663f;
}

/* 動畫 */

@keyframes float{

  0%{
    transform:
      translateY(0px);
  }

  50%{
    transform:
      translateY(-35px);
  }

  100%{
    transform:
      translateY(0px);
  }
}

@keyframes spin{

  from{
    transform:
      rotateY(0deg);
  }

  to{
    transform:
      rotateY(360deg);
  }
}

</style>
</head>
<body>
<!-- 雲 -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<!-- 主體 -->
<div class="scene">
  <div class="float">
<pre><code>&lt;div class=&quot;spin&quot;&gt;

  &lt;/div&gt;

&lt;/div&gt;
</code></pre>
  </div>
  <h1>3D CARROT</h1>
  <p>
    floating in the sky...
  </p>
</div>
<!-- 草地 -->
<div class="ground"></div>
</body>

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {

                    behavior: "smooth"

<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };
