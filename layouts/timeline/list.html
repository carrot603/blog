{{ define "main" }}
<header class="page-header">
    <h1>{{ .Title }}</h1>
    
    
    <button id="random-btn" style="margin-top: 15px; padding: 8px 16px; background: var(--theme); color: var(--primary); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-family: 'Taipei Sans TC', sans-serif; font-weight: 500; transition: all 0.2s;">
        🎲 
    </button>
</header>

<div class="my-clean-list" style="margin-top: 20px;">
    {{ range .Site.RegularPages.ByDate.Reverse }}
    <div style="padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <div>
            <span style="color: var(--secondary); font-size: 0.9em; margin-right: 15px; font-family: monospace;">
                [{{ .Date.Format "2006-01-02" }}]
            </span>
            <a href="{{ .Permalink }}" style="font-weight: 500; text-decoration: none; color: var(--primary);">
                {{ .Title }}
            </a>
            {{ if .Draft }}
            <span style="color: #ff4d4f; font-size: 0.8em; margin-left: 8px; border: 1px solid #ff4d4f; padding: 1px 4px; border-radius: 3px;">Draft</span>
            {{ end }}
        </div>
        <span style="color: var(--secondary); font-size: 0.85em;">
            {{ .WordCount }} 字
        </span>
    </div>
    {{ end }}
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. 利用 Hugo 語法，在編譯時將所有「非草稿」的文章網址倒進這個 JavaScript 陣列中
    const allPosts = [
        {{ range where .Site.RegularPages "Draft" false }}
            "{{ .Permalink }}",
        {{ end }}
    ];

    // 2. 監聽按鈕點擊事件
    document.getElementById("random-btn").addEventListener("click", function() {
        if (allPosts.length === 0) {
            alert("目前還沒有發布的文章可以漫遊喔！");
            return;
        }
        // 3. 隨機抽籤並跳轉
        const randomIndex = Math.floor(Math.random() * allPosts.length);
        window.location.href = allPosts[randomIndex];
    });
});
</script>
{{ end }}
